<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>食材采购</title>
    <link rel="stylesheet" href="css/style.css?v=20260623b">
</head>
<body>
    <!-- 顶部搜索栏 -->
    <header class="top-header">
        <div class="search-bar">
            <span class="search-icon">🔍</span>
            <input type="text" id="searchInput" placeholder="请输入商品编码、名称、条形码" autocomplete="off">
            <span class="search-clear" id="searchClear" style="display:none;">✕</span>
        </div>
        <a href="admin.html" class="admin-link">管理</a>
    </header>

    <!-- 主体：左侧分类 + 右侧商品列表 -->
    <div class="main-body">
        <!-- 左侧分类导航 -->
        <nav class="category-nav" id="categoryNav">
            <!-- JS 动态生成 -->
        </nav>

        <!-- 右侧商品列表 -->
        <section class="product-list" id="productList">
            <div class="category-title" id="currentCategoryTitle">全部</div>
            <div class="products" id="products">
                <!-- JS 动态生成 -->
            </div>
        </section>
    </div>

    <!-- 商品详情弹窗 -->
    <div class="modal-overlay" id="detailModal" style="display:none;">
        <div class="modal-box">
            <button class="modal-close" onclick="closeDetailModal()">✕</button>
            <div id="modalBody"></div>
        </div>
    </div>

    <script>
    // 动态加载 supabase-full.js，带重试
    function loadScript(src, retries = 3) {
        return new Promise((resolve, reject) => {
            function tryLoad(attempt) {
                const s = document.createElement('script');
                s.src = src + '?v=' + Date.now(); // 防缓存
                s.onload = () => resolve();
                s.onerror = () => {
                    if (attempt < retries) {
                        console.warn('脚本加载失败，重试...', src, attempt + 1);
                        setTimeout(() => tryLoad(attempt + 1), 1000);
                    } else {
                        reject(new Error('加载失败: ' + src));
                    }
                };
                document.head.appendChild(s);
            }
            tryLoad(0);
        });
    }

    async function initApp() {
        try {
            await loadScript('js/supabase-full.js');
            const SUPABASE_URL = 'https://infsqrfqksvqzlapvott.supabase.co';
            const SUPABASE_ANON_KEY = 'sb_publishable_2z92LEUAiZf6smg9aiufFg_p16OStvD';
            window.supabase = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
            window.TABLE_NAME = 'food_showcase_products';
            // 加载主逻辑
            await loadScript('js/app.js');
        } catch (err) {
            console.error('初始化失败:', err);
            const el = document.getElementById('products');
            if (el) {
                el.innerHTML = '<div class="empty-state"><div class="empty-icon">⚠️</div><p>页面加载失败，<a href="javascript:location.reload()">点击刷新</a></p></div>';
            } else {
                document.body.innerHTML = '<div style="padding:40px;text-align:center;"><p>⚠️ 加载失败，<a href="javascript:location.reload()">点击刷新</a></p></div>';
            }
        }
    }

    initApp();
    </script>
</body>
</html>
