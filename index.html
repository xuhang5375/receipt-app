<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>账单管理</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--primary:#07c160;--primary-dark:#06ad56;--bg:#f5f6fa;--white:#fff;--text:#333;--text2:#666;--text3:#999;--border:#eee;--red:#e74c3c;--orange:#f39c12}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI','PingFang SC','Hiragino Sans GB',sans-serif;background:var(--bg);color:var(--text);font-size:14px;-webkit-font-smoothing:antialiased}
.app{max-width:480px;margin:0 auto;min-height:100vh;display:flex;flex-direction:column}

/* 顶部导航 */
.header{background:var(--primary);color:#fff;padding:12px 16px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100}
.header .back{font-size:20px;width:32px;cursor:pointer;display:flex;align-items:center;justify-content:center}
.header h1{font-size:17px;font-weight:600;flex:1;text-align:center}
.header .action{font-size:15px;cursor:pointer;opacity:.9}

/* 页面容器 */
.page{display:none;flex:1;padding-bottom:60px}
.page.active{display:block}

/* 底部Tab */
.tabbar{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:480px;background:#fff;border-top:1px solid var(--border);display:flex;z-index:100;padding:4px 0;padding-bottom:max(4px,env(safe-area-inset-bottom))}
.tabbar .tab{flex:1;display:flex;flex-direction:column;align-items:center;padding:6px 0;color:var(--text2);cursor:pointer;font-size:11px}
.tabbar .tab.active{color:var(--primary)}
.tabbar .tab .icon{font-size:22px;line-height:1.2}
.tabbar .tab .label{margin-top:2px}

/* 首页 - 账单列表 */
.bill-list{padding:12px 16px}
.bill-card{background:#fff;border-radius:10px;padding:14px 16px;margin-bottom:10px;box-shadow:0 1px 3px rgba(0,0,0,.04)}
.bill-card .top{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px}
.bill-card .name{font-size:15px;font-weight:600}
.bill-card .id{font-size:12px;color:var(--text3)}
.bill-card .info{display:flex;gap:16px;font-size:12px;color:var(--text2);margin-bottom:8px}
.bill-card .info span{display:flex;align-items:center;gap:3px}
.bill-card .amount-row{display:flex;justify-content:space-between;align-items:center}
.bill-card .amount{font-size:18px;font-weight:700;color:var(--red)}
.bill-card .tags{display:flex;gap:6px}
.tag{font-size:11px;padding:2px 8px;border-radius:10px}
.tag.unpaid{background:#fff3e0;color:var(--orange)}
.tag.paid{background:#e8f5e9;color:var(--primary)}
.tag.unsent{background:#fce4ec;color:var(--red)}
.tag.sent{background:#e3f2fd;color:#1976d2}
.empty{text-align:center;padding:60px 20px;color:var(--text3)}
.empty .icon{font-size:48px;margin-bottom:12px}
.empty p{font-size:14px}

/* 开单页 */
.form-page{padding:16px}
.form-group{margin-bottom:14px}
.form-group label{display:block;font-size:13px;color:var(--text2);margin-bottom:6px;font-weight:500}
.form-group input,.form-group textarea,.form-group select{width:100%;border:1px solid var(--border);border-radius:8px;padding:10px 12px;font-size:14px;outline:none;transition:border-color .2s}
.form-group input:focus,.form-group textarea:focus,.form-group select:focus{border-color:var(--primary)}
.form-group textarea{resize:vertical;min-height:60px}
.row2{display:flex;gap:10px}
.row2 .form-group{flex:1}

/* 商品列表 */
.items-section{background:#fff;border-radius:10px;padding:14px;margin-bottom:14px}
.items-section .header{display:flex;justify-content:space-between;align-items:center;margin-bottom:12px}
.items-section .header span{font-weight:600;font-size:15px}
.btn-add-item{background:none;border:1px dashed var(--primary);color:var(--primary);padding:6px 16px;border-radius:16px;font-size:13px;cursor:pointer}
.item-row{margin-bottom:12px;padding:10px 12px;background:var(--bg);border-radius:8px;border-left:3px solid var(--primary)}
.item-row .iline{display:flex;gap:8px;align-items:center;margin-bottom:6px}
.item-row .iline:last-child{margin-bottom:0}
.item-row input,.item-row select{border:1px solid var(--border);border-radius:6px;padding:8px 10px;font-size:14px;outline:none;background:#fff}
.item-row .iname{flex:1;min-width:0}
.item-row .iunit{width:80px;flex-shrink:0}
.item-row .iqty{width:70px;flex-shrink:0}
.item-row .iprice{width:80px;flex-shrink:0}
.item-row .idel{width:26px;height:26px;border:none;background:#fee;color:var(--red);border-radius:50%;cursor:pointer;font-size:16px;display:flex;align-items:center;justify-content:center;flex-shrink:0}

/* 汇总 */
.summary{background:#fff;border-radius:10px;padding:14px;margin-bottom:14px}
.summary .row{display:flex;justify-content:space-between;padding:6px 0;font-size:13px}
.summary .row.total{border-top:1px solid var(--border);margin-top:6px;padding-top:10px;font-size:16px;font-weight:700;color:var(--red)}

/* 按钮 */
.btn-primary{width:100%;background:var(--primary);color:#fff;border:none;border-radius:10px;padding:14px;font-size:16px;font-weight:600;cursor:pointer}
.btn-primary:active{background:var(--primary-dark)}
.btn-secondary{width:100%;background:#fff;color:var(--primary);border:1px solid var(--primary);border-radius:10px;padding:12px;font-size:15px;cursor:pointer;margin-top:8px}
.btn-sm{padding:6px 16px;border-radius:6px;font-size:13px;cursor:pointer;border:none}
.btn-green{background:var(--primary);color:#fff}
.btn-blue{background:#1976d2;color:#fff}
.btn-gray{background:#eee;color:var(--text2)}

/* 详情页 */
.detail-page{padding:16px}
.detail-card{background:#fff;border-radius:10px;padding:16px;margin-bottom:12px}
.detail-card h2{font-size:16px;margin-bottom:12px;padding-bottom:10px;border-bottom:1px solid var(--border)}
.detail-field{display:flex;justify-content:space-between;padding:7px 0;font-size:13px}
.detail-field .label{color:var(--text2)}
.detail-field .value{font-weight:500;text-align:right;max-width:60%}
.detail-table{width:100%;border-collapse:collapse;font-size:13px;margin:10px 0}
.detail-table th{background:var(--bg);padding:8px 6px;text-align:left;font-weight:600;font-size:12px;color:var(--text2)}
.detail-table td{padding:8px 6px;border-bottom:1px solid var(--border)}
.detail-table .num-col{text-align:center;width:40px}
.detail-table .qty-col,.detail-table .price-col,.detail-table .amt-col{text-align:right;width:60px}
.detail-actions{display:flex;gap:10px;margin-top:16px}
.detail-actions .btn-primary,.detail-actions .btn-secondary{flex:1}

/* 预览页 */
.preview-page{padding:16px;background:var(--bg)}
.preview-sheet{background:#fff;border-radius:10px;padding:20px 16px;box-shadow:0 2px 12px rgba(0,0,0,.08)}
.preview-header{text-align:center;margin-bottom:16px}
.preview-header h1{font-size:20px;font-weight:700;color:var(--text);letter-spacing:2px}
.preview-header .subtitle{font-size:12px;color:var(--text3);margin-top:4px}
.preview-info{display:flex;justify-content:space-between;flex-wrap:wrap;font-size:13px;margin-bottom:14px;padding-bottom:12px;border-bottom:2px solid var(--text)}
.preview-info p{width:48%;padding:3px 0}
.preview-table{width:100%;border-collapse:collapse;font-size:13px;margin-bottom:14px}
.preview-table th{background:var(--bg);padding:8px 6px;text-align:left;font-weight:600;font-size:12px;border:1px solid var(--border)}
.preview-table td{padding:8px 6px;border:1px solid var(--border)}
.preview-total{display:flex;justify-content:space-between;padding:10px 0;border-top:2px double var(--text);font-size:15px;font-weight:700;margin-bottom:14px}
.preview-pay{font-size:13px;margin-bottom:14px}
.preview-pay .pay-row{display:flex;align-items:center;gap:6px;padding:3px 0}
.preview-pay .checkbox{width:16px;height:16px;border:1px solid #999;border-radius:3px;display:inline-flex;align-items:center;justify-content:center;font-size:12px;margin-right:2px}
.preview-pay .checkbox.checked{background:var(--primary);color:#fff;border-color:var(--primary)}
.preview-footer{display:flex;gap:10px;margin-top:16px}
.preview-footer button{flex:1}

/* 搜索栏 */
.search-bar{padding:10px 16px;background:var(--bg)}
.search-bar input{width:100%;border:1px solid var(--border);border-radius:20px;padding:8px 16px;font-size:13px;outline:none;background:#fff}

/* 筛选 */
.filter-bar{display:flex;gap:8px;padding:0 16px 10px;overflow-x:auto}
.filter-bar .chip{padding:5px 14px;border-radius:16px;font-size:12px;white-space:nowrap;cursor:pointer;border:1px solid var(--border);background:#fff;color:var(--text2)}
.filter-bar .chip.active{background:var(--primary);color:#fff;border-color:var(--primary)}

/* 弹窗 */
.modal-overlay{display:none;position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.4);z-index:200;align-items:flex-end;justify-content:center}
.modal-overlay.show{display:flex}
.modal{background:#fff;border-radius:16px 16px 0 0;width:100%;max-width:480px;padding:20px 16px;max-height:80vh;overflow-y:auto}
.modal h3{text-align:center;font-size:16px;margin-bottom:16px}
.modal .actions{display:flex;gap:10px;margin-top:16px}
.modal .actions button{flex:1;padding:10px;border-radius:8px;font-size:14px;cursor:pointer;border:none}
.modal .btn-cancel{background:#f5f5f5;color:var(--text2)}
.modal .btn-confirm{background:var(--primary);color:#fff}

/* 统计 */
.stats-bar{display:flex;gap:10px;padding:12px 16px}
.stat-card{flex:1;background:#fff;border-radius:10px;padding:12px;text-align:center}
.stat-card .val{font-size:18px;font-weight:700;color:var(--primary)}
.stat-card .lab{font-size:11px;color:var(--text3);margin-top:2px}
</style>
</head>
<body>
<div class="app">

<!-- 首页 -->
<div class="page active" id="page-home">
  <div class="header">
    <div class="back" style="visibility:hidden">‹</div>
    <h1>服务账单</h1>
    <div class="action" onclick="showPage('new')">＋</div>
  </div>

  <!-- 统计 -->
  <div class="stats-bar">
    <div class="stat-card"><div class="val" id="stat-total">0</div><div class="lab">总金额</div></div>
    <div class="stat-card"><div class="val" id="stat-unpaid">0</div><div class="lab">未结清</div></div>
    <div class="stat-card"><div class="val" id="stat-count">0</div><div class="lab">账单数</div></div>
  </div>

  <!-- 搜索 -->
  <div class="search-bar">
    <input type="text" id="searchInput" placeholder="搜索客户名/商品..." oninput="renderBillList()">
  </div>

  <!-- 筛选 -->
  <div class="filter-bar" id="filterBar">
    <div class="chip active" data-filter="all" onclick="setFilter(this)">全部</div>
    <div class="chip" data-filter="unpaid" onclick="setFilter(this)">未结清</div>
    <div class="chip" data-filter="unpaid_unsent" onclick="setFilter(this)">未结清未发送</div>
    <div class="chip" data-filter="paid" onclick="setFilter(this)">已结清</div>
  </div>

  <div class="bill-list" id="billList"></div>
</div>

<!-- 新建/编辑页 -->
<div class="page" id="page-new">
  <div class="header">
    <div class="back" onclick="showPage('home')">‹</div>
    <h1 id="formTitle">新建账单</h1>
    <div class="action" style="visibility:hidden">　</div>
  </div>
  <div class="form-page">
    <div class="form-group">
      <label>客户姓名 *</label>
      <input type="text" id="fCustomer" placeholder="输入客户姓名">
    </div>
    <div class="row2">
      <div class="form-group">
        <label>联系电话</label>
        <input type="tel" id="fPhone" placeholder="手机号">
      </div>
      <div class="form-group">
        <label>日期</label>
        <input type="date" id="fDate">
      </div>
    </div>
    <div class="form-group">
      <label>收货地址</label>
      <div style="display:flex;gap:8px">
        <input type="text" id="fAddress" placeholder="输入地址后点击分析" style="flex:1" oninput="onAddrInput()">
        <button type="button" class="btn-sm btn-green" onclick="analyzeAddress()" style="white-space:nowrap;padding:8px 14px;font-size:13px">一键分析</button>
      </div>
      <div id="addrResult" style="margin-top:6px;font-size:12px;color:var(--text2);display:none"></div>
    </div>


    <div class="items-section">
      <div class="header">
        <span>商品明细</span>
        <button class="btn-add-item" onclick="addItem()">＋ 添加商品</button>
      </div>
      <div id="itemsContainer"></div>
    </div>

    <div class="summary">
      <div class="row"><span>合计金额（大写）</span><span id="sChinese">零元整</span></div>
      <div class="row total"><span>￥</span><span id="sTotal">0.00</span></div>
    </div>

    <div class="form-group">
      <label>优惠金额</label>
      <input type="number" id="fDiscount" value="0" min="0" step="0.01" oninput="calcTotal()">
    </div>
    <div class="summary">
      <div class="row total"><span>实收金额</span><span id="sActual">0.00</span></div>
      <div class="row"><span>欠款金额</span><span id="sDebt" style="color:var(--red)">0.00</span></div>
    </div>

    <button class="btn-primary" onclick="saveBill()" style="margin-top:16px">保存账单</button>
    <button class="btn-secondary" onclick="saveAndPreview()">预览 / 发送客户</button>
  </div>
</div>

<!-- 详情页 -->
<div class="page" id="page-detail">
  <div class="header">
    <div class="back" onclick="showPage('home')">‹</div>
    <h1>收据详情</h1>
    <div class="action" id="detailMenu" onclick="showDetailMenu()">···</div>
  </div>
  <div class="detail-page" id="detailContent"></div>
</div>

<!-- 预览页 -->
<div class="page" id="page-preview">
  <div class="header">
    <div class="back" onclick="goBackFromPreview()">‹</div>
    <h1>服务账单</h1>
    <div class="action" style="visibility:hidden">　</div>
  </div>
  <div class="preview-page" id="previewContent"></div>
</div>

<!-- 底部Tab（首页显示） -->
<div class="tabbar" id="tabbar">
  <div class="tab active" onclick="switchTab(this,'home')"><div class="icon">🏠</div><div class="label">回首页</div></div>
  <div class="tab" onclick="showPage('new')"><div class="icon">💾</div><div class="label">保存</div></div>
  <div class="tab" onclick="alert('扫码领取功能开发中')"><div class="icon">📱</div><div class="label">扫码领取</div></div>
  <div class="tab" onclick="alert('转发微信功能开发中')"><div class="icon">💬</div><div class="label">转发微信</div></div>
</div>

<!-- 操作菜单弹窗 -->
<div class="modal-overlay" id="menuModal">
  <div class="modal">
    <h3>操作菜单</h3>
    <div id="menuOptions" style="display:flex;flex-direction:column;gap:10px"></div>
    <div class="actions">
      <button class="btn-cancel" onclick="closeModal()">取消</button>
    </div>
  </div>
</div>

</div>

<script>
// ===== 数据层 =====
const DB_KEY = 'receipt_bills';
let bills = [];
let currentBillId = null;
let currentFilter = 'all';
let editingBill = null;

function loadBills() {
  try { bills = JSON.parse(localStorage.getItem(DB_KEY) || '[]'); } catch(e) { bills = []; }
}
function saveBills() {
  localStorage.setItem(DB_KEY, JSON.stringify(bills));
}

// ===== 工具函数 =====
function uid() {
  return Date.now().toString(36) + Math.random().toString(36).slice(2,8);
}
function fmt(n) {
  return (parseFloat(n)||0).toFixed(2);
}
function toChineseNum(n) {
  const nums = ['零','壹','贰','叁','肆','伍','陆','柒','捌','玖'];
  const units = ['','拾','佰','仟'];
  const bigUnits = ['','万','亿'];
  n = Math.round(parseFloat(n)*100)/100;
  if (n === 0) return '零元整';
  const intPart = Math.floor(n);
  const decPart = Math.round((n - intPart) * 100);
  let s = '';
  // 整数部分
  if (intPart > 0) {
    let intStr = intPart.toString();
    let parts = [];
    while (intStr.length > 0) {
      let chunk = intStr.slice(-4);
      intStr = intStr.slice(0, -4);
      let cs = '';
      for (let i = 0; i < chunk.length; i++) {
        let digit = parseInt(chunk[i]);
        let pos = chunk.length - 1 - i;
        if (digit === 0) {
          if (cs && !cs.endsWith('零')) cs += '零';
        } else {
          cs += nums[digit] + units[pos];
        }
      }
      if (cs) parts.unshift(cs.replace(/零+$/, '') + bigUnits[parts.length]);
    }
    s += parts.join('');
    s += '元';
  } else {
    s = '零元';
  }
  // 小数
  if (decPart > 0) {
    const jiao = Math.floor(decPart / 10);
    const fen = decPart % 10;
    if (jiao > 0) s += nums[jiao] + '角';
    else if (intPart > 0) s += '零';
    if (fen > 0) s += nums[fen] + '分';
  } else {
    s += '整';
  }
  return s;
}
function todayStr() {
  const d = new Date();
  return d.getFullYear() + '-' + String(d.getMonth()+1).padStart(2,'0') + '-' + String(d.getDate()).padStart(2,'0');
}

// ===== 页面切换 =====
function showPage(name) {
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.getElementById('page-' + name).classList.add('active');
  document.getElementById('tabbar').style.display = name === 'home' ? 'flex' : 'none';
  if (name === 'home') renderBillList();
  if (name === 'new' && !editingBill) resetForm();
}
function goBackFromPreview() {
  if (currentBillId) showPage('detail'); else showPage('home');
}
function switchTab(el, page) {
  document.querySelectorAll('.tabbar .tab').forEach(t => t.classList.remove('active'));
  el.classList.add('active');
  if (page === 'new') showPage('new');
}

// ===== 筛选 =====
function setFilter(el) {
  document.querySelectorAll('.filter-bar .chip').forEach(c => c.classList.remove('active'));
  el.classList.add('active');
  currentFilter = el.dataset.filter;
  renderBillList();
}

// ===== 商品行操作 =====
let itemIndex = 0;
function addItem(data) {
  data = data || { name:'', unit:'斤', qty:1, price:0 };
  const div = document.createElement('div');
  div.className = 'item-row';
  div.id = 'item_' + itemIndex;
  div.innerHTML =
    '<div class="iline"><input class="iname" placeholder="输入产品名称" value="'+esc(data.name)+'"></div>' +
    '<div class="iline">' +
      '<select class="iunit"><option value="斤"'+(data.unit==='斤'?' selected':'')+'>斤</option><option value="袋"'+(data.unit==='袋'?' selected':'')+'>袋</option><option value="箱"'+(data.unit==='箱'?' selected':'')+'>箱</option></select>' +
      '<input class="iqty" type="number" placeholder="数量" value="'+data.qty+'" min="0" step="any" oninput="calcTotal()">' +
      '<input class="iprice" type="number" placeholder="单价" value="'+(data.price||0)+'" min="0" step="any" oninput="calcTotal()">' +
      '<button class="idel" onclick="removeItem('+itemIndex+')">×</button>' +
    '</div>';
  document.getElementById('itemsContainer').appendChild(div);
  itemIndex++;
  calcTotal();
}
function removeItem(id) {
  const el = document.getElementById('item_' + id);
  if (el) { el.remove(); calcTotal(); }
}
function esc(s) { return (s||'').replace(/"/g,'&quot;').replace(/</g,'&lt;'); }

// ===== 计算汇总 =====
function calcTotal() {
  let total = 0;
  document.querySelectorAll('#itemsContainer .item-row').forEach(row => {
    const q = parseFloat(row.querySelector('.iqty').value) || 0;
    const p = parseFloat(row.querySelector('.iprice').value) || 0;
    total += q * p;
  });
  const discount = parseFloat(document.getElementById('fDiscount').value) || 0;
  const actual = Math.max(0, total - discount);
  const debt = actual;
  document.getElementById('sTotal').textContent = fmt(total);
  document.getElementById('sChinese').textContent = toChineseNum(total);
  document.getElementById('sActual').textContent = fmt(actual);
  document.getElementById('sDebt').textContent = fmt(debt);
  return { total, discount, actual, debt };
}

// ===== 表单重置 =====
function resetForm() {
  editingBill = null;
  document.getElementById('formTitle').textContent = '新建账单';
  document.getElementById('fCustomer').value = '';
  document.getElementById('fPhone').value = '';
  document.getElementById('fDate').value = todayStr();
  document.getElementById('fAddress').value = '';
  document.getElementById('fDiscount').value = '0';
  document.getElementById('itemsContainer').innerHTML = '';
  itemIndex = 0;
  addItem();
  calcTotal();
}

// ===== 保存账单 =====
function saveBill() {
  const customer = document.getElementById('fCustomer').value.trim();
  if (!customer) { alert('请输入客户姓名'); return; }
  const items = [];
  document.querySelectorAll('#itemsContainer .item-row').forEach(row => {
    const name = row.querySelector('.iname').value.trim();
    if (!name) return;
    items.push({
      name,
      unit: row.querySelector('.iunit').value.trim() || '斤',
      qty: parseFloat(row.querySelector('.iqty').value) || 0,
      price: parseFloat(row.querySelector('.iprice').value) || 0
    });
  });
  if (items.length === 0) { alert('请至少添加一个商品'); return; }
  const { total, discount, actual } = calcTotal();
  const payMethods = ['现金']; // 默认

  const bill = {
    id: editingBill ? editingBill.id : uid(),
    customer,
    phone: document.getElementById('fPhone').value.trim(),
    date: document.getElementById('fDate').value || todayStr(),
    address: document.getElementById('fAddress').value.trim(),
    handler: '',
    items,
    total,
    discount,
    actual,
    debt: actual,
    paid: actual <= 0,
    sent: false,
    payMethods,
    contactPhone: '',
    contactAddr: '',
    payee: '',
    createdAt: editingBill ? editingBill.createdAt : new Date().toISOString(),
    updatedAt: new Date().toISOString()
  };

  if (editingBill) {
    const idx = bills.findIndex(b => b.id === bill.id);
    if (idx >= 0) bills[idx] = bill;
  } else {
    bills.unshift(bill);
  }
  saveBills();
  editingBill = null;
  currentBillId = bill.id;
  alert('保存成功！');
  showPage('detail');
  renderDetail(bill);
}

function saveAndPreview() {
  const customer = document.getElementById('fCustomer').value.trim();
  if (!customer) { alert('请输入客户姓名'); return; }
  saveBill(); // 会设置currentBillId并跳到详情
  setTimeout(() => showPreview(currentBillId), 300);
}

// ===== 账单列表渲染 =====
function renderBillList() {
  const kw = document.getElementById('searchInput').value.toLowerCase();
  let list = bills.filter(b => {
    if (kw) {
      const matchName = b.customer.toLowerCase().includes(kw);
      const matchItem = b.items.some(it => it.name.toLowerCase().includes(kw));
      if (!matchName && !matchItem) return false;
    }
    if (currentFilter === 'unpaid') return b.debt > 0;
    if (currentFilter === 'unpaid_unsent') return b.debt > 0 && !b.sent;
    if (currentFilter === 'paid') return b.paid;
    return true;
  });

  const container = document.getElementById('billList');
  if (list.length === 0) {
    container.innerHTML = '<div class="empty"><div class="icon">📋</div><p>暂无账单</p><p style="font-size:12px;margin-top:4px">点击右上角 ＋ 创建新账单</p></div>';
    updateStats(list);
    return;
  }

  container.innerHTML = list.map(b => `
    <div class="bill-card" onclick="viewBill('${b.id}')">
      <div class="top">
        <span class="name">${esc(b.customer)}</span>
        <div class="tags">
          <span class="tag ${b.paid?'paid':'unpaid'}">${b.paid?'已结清':'未结清'}</span>
          <span class="tag ${b.sent?'sent':'unsent'}">${b.sent?'已发送':'未发送'}</span>
        </div>
      </div>
      <div class="info">
        <span>📞 ${esc(b.phone||'-')}</span>
        <span>📍 ${esc(b.address||'-')}</span>
        <span>🕐 ${b.date}</span>
      </div>
      <div class="amount-row">
        <span style="font-size:12px;color:var(--text2)">
          ${b.items.map(i=>`${i.name} ${i.qty}/${i.unit}*${i.price}`).join('、')}
        </span>
        <span class="amount">￥${fmt(b.actual)}</span>
      </div>
    </div>
  `).join('');

  updateStats(list);
}

function updateStats(list) {
  const total = list.reduce((s,b)=>s+b.actual,0);
  const unpaid = list.filter(b=>b.debt>0).reduce((s,b)=>s+b.debt,0);
  document.getElementById('stat-total').textContent = '￥'+fmt(total);
  document.getElementById('stat-unpaid').textContent = '￥'+fmt(unpaid);
  document.getElementById('stat-count').textContent = list.length;
}

function formatTime(iso) {
  if (!iso) return '-';
  const d = new Date(iso);
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')} ${String(d.getHours()).padStart(2,'0')}:${String(d.getMinutes()).padStart(2,'0')}:${String(d.getSeconds()).padStart(2,'0')}`;
}

// ===== 编辑当前账单 =====

  document.getElementById('formTitle').textContent = '编辑账单';
  document.getElementById('fCustomer').value = bill.customer;
  document.getElementById('fPhone').value = bill.phone || '';
  document.getElementById('fDate').value = bill.date;
  document.getElementById('fAddress').value = bill.address || '';
  document.getElementById('fDiscount').value = bill.discount || 0;

  document.getElementById('itemsContainer').innerHTML = '';
  itemIndex = 0;
  (bill.items||[]).forEach(it => addItem(it));

  calcTotal();
  showPage('new');
}

  `;

}
function closeModal() { document.getElementById('menuModal').classList.remove('show'); }

function deleteBill() {
  if (!confirm('确定删除此账单？')) return;
  bills = bills.filter(b => b.id !== currentBillId);
  saveBills();
  closeModal();
  showPage('home');
}
function togglePaidStatus() {
  const bill = bills.find(b => b.id === currentBillId);
  if (!bill) return;
  bill.paid = !bill.paid;
  if (bill.paid) bill.debt = 0;
  else bill.debt = bill.actual;
  bill.updatedAt = new Date().toISOString();
  saveBills();
  closeModal();
  renderDetail(bill);
}
function toggleSentStatus() {
  const bill = bills.find(b => b.id === currentBillId);
  if (!bill) return;
  bill.sent = !bill.sent;
  bill.updatedAt = new Date().toISOString();
  saveBills();
  closeModal();
  renderDetail(bill);
}

// ===== 一键分析地址 =====
function onAddrInput() {
  document.getElementById('addrResult').style.display = 'none';
}
function analyzeAddress() {
  const addr = document.getElementById('fAddress').value.trim();
  if (!addr) { alert('请先输入地址'); return; }
  const resultEl = document.getElementById('addrResult');
  const provinces = ['北京','天津','上海','重庆','河北','山西','辽宁','吉林','黑龙江','江苏','浙江','安徽','福建','江西','山东','河南','湖北','湖南','广东','海南','四川','贵州','云南','陕西','甘肃','青海','台湾','内蒙古','广西','西藏','宁夏','新疆','香港','澳门'];
  let province = '', city = '', detail = addr;
  for (const p of provinces) {
    if (addr.includes(p)) { province = p; detail = detail.replace(p, ''); break; }
  }
  const cityMatch = detail.match(/(.+?(?:市|区|县|旗|盟|自治州|地区))/);
  if (cityMatch) { city = cityMatch[1]; }
  
  resultEl.style.display = 'block';
  if (province || city) {
    resultEl.innerHTML = '<span style="color:var(--primary);font-weight:600">已识别：</span>' +
      (province ? '<span style="background:#e8f5e9;padding:2px 8px;border-radius:4px;margin-right:4px">省：'+province+'</span>' : '') +
      (city ? '<span style="background:#e8f5e9;padding:2px 8px;border-radius:4px">市/区：'+city+'</span>' : '');
    // 自动格式化回填
    let formatted = '';
    if (province) formatted += province;
    if (city) { if (formatted && !city.startsWith('市') && !city.startsWith('区')) formatted += ' '; formatted += city; }
    const remaining = addr.replace(province,'').replace(city,'').trim();
    if (remaining) formatted += ' ' + remaining;
    document.getElementById('fAddress').value = formatted.trim();
  } else {
    resultEl.innerHTML = '<span style="color:var(--orange)">未能识别省市区，地址保持原样</span>';
  }
}
